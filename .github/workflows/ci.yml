name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  linux:
    name: Linux amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          gofmt -w main.go
          git diff --exit-code

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: bash scripts/build.sh
